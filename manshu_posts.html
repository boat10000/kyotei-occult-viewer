<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>投稿センター｜万舟率</title>
<style>
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#f4f6fb;color:#1c2230;max-width:680px;margin:0 auto;padding:16px;line-height:1.7}
h1{font-size:20px;margin:0 0 4px}
.sub{color:#5b6577;font-size:13px;margin:0 0 14px}
.nav{font-size:13px;font-weight:700;margin:0 0 16px}
.nav a{color:#2563eb;text-decoration:none}
.card{background:#fff;border:1px solid #e3e8f0;border-left:6px solid #16a34a;border-radius:12px;padding:14px 16px;margin:0 0 16px}
.card h2{font-size:16px;margin:0 0 8px;color:#15803d}
textarea{width:100%;box-sizing:border-box;font:13.5px/1.6 -apple-system,"Hiragino Kaku Gothic ProN",Meiryo,monospace;border:1px solid #cbd5e1;border-radius:8px;padding:10px 11px;background:#f8fafc;color:#0f172a;resize:vertical;white-space:pre-wrap;word-break:break-word}
button{font:inherit;font-weight:700;background:#16a34a;color:#fff;border:0;border-radius:8px;padding:9px 18px;cursor:pointer;margin:8px 0 0}
button:active{opacity:.7}
.len{font-size:12px;color:#64748b;margin-left:8px}
.upd{font-size:12px;color:#8a93a6;margin-top:6px}
footer{color:#8a93a6;font-size:11.5px;text-align:center;margin-top:20px}
</style></head><body>
<h1>📋 投稿センター</h1>
<p class="sub">場・レース・万舟率だけのシンプルな投稿文。コピーしてX/noteにそのまま貼り付けられます。</p>
<p class="nav">🌊 <a href="manshu.html">朝の万舟率ランキングに戻る</a></p>
<div id="posts">読み込み中…</div>
<footer>※娯楽用・利益保証なし</footer>
<script>
function copyText(btn){
  var ta=btn.parentElement.querySelector('textarea');
  ta.select(); ta.setSelectionRange(0,99999);
  var done=function(){var o=btn.textContent; btn.textContent='✅ コピーしました'; setTimeout(function(){btn.textContent=o;},1500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(ta.value).then(done,function(){document.execCommand('copy');done();});}
  else{document.execCommand('copy');done();}
}
fetch('manshu_posts.json?_='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
  var box=document.getElementById('posts');
  var posts=(d&&d.posts)||[];
  if(!posts.length){box.innerHTML='<p class="sub">本日の投稿文はまだ生成されていません。</p>';return;}
  box.innerHTML=posts.map(function(p){
    var t=(p.text||'');
    var rows=Math.max(4,t.split('\n').length+1);
    return '<div class="card"><h2>'+(p.title||p.id)+'</h2>'
      +'<textarea readonly rows="'+rows+'">'+t.replace(/</g,'&lt;')+'</textarea>'
      +'<div><button onclick="copyText(this)">📋 コピー</button>'
      +'<span class="len">'+t.length+'字</span></div></div>';
  }).join('');
  if(d.updated){box.insertAdjacentHTML('beforeend','<p class="upd">更新: '+d.updated+'</p>');}
}).catch(function(){document.getElementById('posts').innerHTML='<p class="sub">読み込みに失敗しました。</p>';});
</script></body></html>
