<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>万舟運用ダッシュボード</title>
  <style>
    :root{--bg:#f5f7fb;--ink:#172033;--muted:#667085;--line:#dbe3ef;--panel:#fff;--blue:#1d4ed8;--green:#07825d;--red:#c92335;--amber:#a16207}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;line-height:1.55}
    .shell{max-width:1120px;margin:0 auto;padding:18px 14px 32px}
    .header{background:#111827;color:#fff;border-radius:8px;padding:18px;margin-bottom:12px}
    .eyebrow{margin:0 0 4px;color:#93c5fd;font-size:12px;font-weight:900;letter-spacing:.08em}
    h1{margin:0;font-size:25px;line-height:1.25}
    .header p{margin:8px 0 0;color:#d1d5db;font-size:13px}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 14px}
    .nav a,.nav button{appearance:none;border:1px solid var(--line);background:#fff;color:#1d4ed8;border-radius:8px;padding:9px 12px;font:inherit;font-size:13px;font-weight:900;text-decoration:none;cursor:pointer}
    .status,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}
    .status{border-left:6px solid var(--blue)}
    .status strong{color:#0f3f91}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
    .card{background:#fbfcff;border:1px solid var(--line);border-radius:8px;padding:10px}
    .card b{display:block;font-size:22px;color:#111827;line-height:1.25}
    .card span{display:block;color:var(--muted);font-size:12px;font-weight:800}
    h2{margin:0 0 8px;font-size:18px;color:#111827}
    .lead{margin:0 0 8px;color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
    th,td{border-top:1px solid #edf1f7;padding:9px 8px;text-align:left;vertical-align:top}
    th{background:#f8fafc;color:#475467;font-size:12px}
    .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
    .hot{color:var(--red);font-weight:900}
    .good{color:var(--green);font-weight:900}
    .warn{color:var(--amber);font-weight:900}
    .badge{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;background:#f8fafc;color:#344054;padding:2px 8px;font-size:11px;font-weight:900}
    .badge.core{border-color:#fecdd3;background:#fff1f2;color:#be123c}
    .badge.semi{border-color:#fed7aa;background:#fff7ed;color:#9a3412}
    .badge.wait{border-color:#dbe3ef;background:#f8fafc;color:#475467}
    .latest{display:grid;gap:9px}
    .race{border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px}
    .race-top{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
    .race-title{font-size:16px;font-weight:900;color:#111827}
    .rate{font-size:20px;font-weight:900;color:var(--red);white-space:nowrap}
    .mini{color:var(--muted);font-size:12px}
    .roles{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}
    .role{border:1px solid #e5e7eb;border-radius:8px;background:#f8fafc;padding:7px}
    .role b{display:block;color:#475467;font-size:11px}
    .role strong{display:block;color:#111827;font-size:14px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    footer{color:#8a93a6;font-size:11.5px;text-align:center;margin-top:22px}
    @media(max-width:760px){
      .shell{padding:12px 10px 28px}
      h1{font-size:22px}
      .cards,.two,.roles{grid-template-columns:1fr}
      table,thead,tbody,tr,th,td{display:block}
      thead{display:none}
      tr{border-top:1px solid #edf1f7;padding:9px 0}
      td{border:0;padding:3px 0}
      .num{text-align:left}
      .race-top{display:block}
      .rate{margin-top:5px}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <p class="eyebrow">CODEX MANSHU OPS</p>
      <h1>万舟運用ダッシュボード</h1>
      <p>保存済みJSONをSQLiteへまとめ、監視・展示後判定・買い目・結果を検証するページです。本番ランキングのロジックは変えません。</p>
    </header>
    <nav class="nav">
      <a href="manshu.html">朝監視ページ</a>
      <a href="manshu_posts.html">投稿センター</a>
      <a href="manshu_days.html">過去結果</a>
      <a href="manshu_research.html">研究ノート</a>
      <button type="button" id="reload">再読み込み</button>
    </nav>
    <section class="status" id="status"><strong>運用データを読み込み中</strong></section>
    <section class="panel" id="overview"></section>
    <section class="panel" id="latest"></section>
    <section class="panel" id="segments"></section>
    <div class="two">
      <section class="panel" id="venues"></section>
      <section class="panel" id="months"></section>
    </div>
    <footer>研究・記録用。的中や利益を保証するものではありません。</footer>
  </div>
  <script>
    const DATA_URL="data/output/manshu_ops_summary.json";
    const yen=v=>v==null?"--":Number(v).toLocaleString("ja-JP")+"円";
    const pct=v=>v==null?"--":Number(v).toFixed(2).replace(/\.00$/,"")+"%";
    const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const cls=d=>d==="本命"||d==="強本命"?"core":(d==="準本命"?"semi":"wait");
    function segTable(rows){
      return `<table><thead><tr><th>区分</th><th class="num">対象</th><th class="num">確定</th><th class="num">万舟率</th><th class="num">買いR</th><th class="num">的中率</th><th class="num">回収率</th><th class="num">収支</th><th class="num">最大連敗</th></tr></thead><tbody>`+
        rows.map(r=>`<tr><td><b>${esc(r.segment)}</b></td><td class="num">${r.races}</td><td class="num">${r.settled_races}</td><td class="num hot">${pct(r.manshu_rate_pct)}</td><td class="num">${r.bought_races}</td><td class="num">${pct(r.hit_rate_pct)}</td><td class="num ${Number(r.roi_pct)>=100?'good':'warn'}">${pct(r.roi_pct)}</td><td class="num">${yen(r.profit_yen)}</td><td class="num">${r.max_losing_streak??"--"}</td></tr>`).join("")+
        `</tbody></table>`;
    }
    function smallTable(rows,key,title){
      return `<h2>${title}</h2><p class="lead">保存済みデータの確定分だけで集計します。</p><table><thead><tr><th>${key==="place_name"?"場":"月"}</th><th class="num">確定</th><th class="num">万舟率</th><th class="num">買いR</th><th class="num">回収率</th></tr></thead><tbody>`+
        rows.map(r=>`<tr><td><b>${esc(r[key]||r.segment)}</b></td><td class="num">${r.settled_races}</td><td class="num hot">${pct(r.manshu_rate_pct)}</td><td class="num">${r.bought_races}</td><td class="num ${Number(r.roi_pct)>=100?'good':'warn'}">${pct(r.roi_pct)}</td></tr>`).join("")+
        `</tbody></table>`;
    }
    function latest(data){
      const rows=(data.latest&&data.latest.races)||[];
      if(!rows.length)return `<h2>最新日の表示</h2><p class="lead">最新日のレースがまだありません。</p>`;
      return `<h2>${esc(data.latest.date)} 最新TOP10</h2><p class="lead">頭・軸・消し・買い目点数と結果をまとめて確認します。</p><div class="latest">`+
        rows.map(r=>`<div class="race"><div class="race-top"><div><div class="race-title">${r.rank}位 ${esc(r.place_name)}${r.round}R <span class="badge ${cls(r.decision_class)}">${esc(r.decision_class)}</span></div><div class="mini">${esc(r.deadline)}締切 / ${r.result_trifecta?`結果 ${esc(r.result_trifecta)} ${yen(r.payout_yen)}`:"結果待ち"}</div></div><div class="rate">${pct(r.manshu_rate_pct)}</div></div><div class="roles"><div class="role"><b>頭</b><strong>${esc(r.heads||"--")}</strong></div><div class="role"><b>軸</b><strong>${esc(r.axes||"--")}</strong></div><div class="role"><b>消し</b><strong>${esc(r.keshi||"--")}</strong></div><div class="role"><b>買い目</b><strong>${r.ticket_count||0}点 ${r.ticket_hit?"的中":"-"}</strong></div></div></div>`).join("")+
        `</div>`;
    }
    function render(data){
      const src=data.source||{};
      document.getElementById("status").innerHTML=`<strong>${esc(data.generated_at)} 生成</strong><div class="mini">DB: ${esc(src.db_path)} / snapshots ${src.snapshot_count} / primary ${src.primary_race_count}</div>`;
      const main=(data.segments||[])[0]||{};
      const core=(data.segments||[]).find(r=>r.segment==="本命40%以上")||{};
      const buy=(data.segments||[]).find(r=>r.segment==="買い目あり")||{};
      document.getElementById("overview").innerHTML=`<h2>運用サマリー</h2><div class="cards"><div class="card"><b>${main.settled_races??0}</b><span>確定レース</span></div><div class="card"><b>${pct(main.manshu_rate_pct)}</b><span>全体万舟率</span></div><div class="card"><b>${pct(core.manshu_rate_pct)}</b><span>本命40%以上 万舟率</span></div><div class="card"><b>${pct(buy.roi_pct)}</b><span>買い目あり回収率</span></div></div>`;
      document.getElementById("latest").innerHTML=latest(data);
      document.getElementById("segments").innerHTML=`<h2>条件別 成績</h2><p class="lead">回収率は保存JSON内の買い目を1点100円で買った想定です。結果がないレースは回収率計算から除外します。</p>${segTable(data.segments||[])}`;
      document.getElementById("venues").innerHTML=smallTable(data.by_venue||[],"place_name","場別");
      document.getElementById("months").innerHTML=smallTable(data.by_month||[],"month","月別");
    }
    async function load(){
      try{
        const r=await fetch(DATA_URL+"?v="+Date.now(),{cache:"no-store"});
        if(!r.ok)throw new Error("HTTP "+r.status);
        render(await r.json());
      }catch(e){
        document.getElementById("status").innerHTML=`<strong>運用JSONが見つかりません</strong><div class="mini">${esc(e.message||e)}</div>`;
      }
    }
    document.getElementById("reload").addEventListener("click",load);
    load();
  </script>
</body>
</html>
