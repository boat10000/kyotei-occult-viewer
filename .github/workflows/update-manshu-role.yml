name: Update manshu role ranking

on:
  schedule:
    # 09:15 JST. Keeps official-data access low-frequency and cache-first.
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "JST date to update, e.g. 2026-06-17. Empty means today."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-manshu-role
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lhasa

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install certifi pandas

      - name: Restore official data cache
        uses: actions/cache@v4
        with:
          path: .cache/boatrace
          key: boatrace-role-${{ github.event.inputs.date || 'today' }}-${{ github.run_id }}
          restore-keys: |
            boatrace-role-${{ github.event.inputs.date || 'today' }}-
            boatrace-role-

      - name: Update role JSON
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          DATE="$INPUT_DATE"
          if [ -z "$DATE" ]; then
            DATE="$(TZ=Asia/Tokyo date +%F)"
          fi
          python scripts/update_manshu_role_daily.py \
            --date "$DATE" \
            --mode morning \
            --source official \
            --raw-dir .cache/boatrace/raw \
            --normalized-dir .cache/boatrace/normalized

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/output/manshu_role_ranking_*.json
          if git diff --cached --quiet; then
            echo "No generated JSON changes."
            exit 0
          fi
          git commit -m "Update manshu role ranking JSON"
          git push
