<!doctype html><html lang=ja><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>手動買い目 検証ツール</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;max-width:720px;margin:0 auto;padding:14px}
h1{font-size:18px} h2{font-size:15px;margin-top:18px} a{color:#60a5fa}
.nav{font-size:13px;font-weight:700} .m{color:#94a3b8;font-size:12px;line-height:1.55}
.c{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:11px 13px;margin:8px 0}
.c b{color:#fbbf24} .hd{font-size:15px;font-weight:700;margin-bottom:4px}
select{background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:3px 6px;font-size:15px;margin:0 2px}
.row{margin:5px 0;font-size:14px} .lbl{color:#94a3b8;display:inline-block;min-width:74px}
.buy{background:#0b1220;border-radius:8px;padding:8px 10px;margin-top:7px;font-size:14px} .buy b{color:#fde047}
button{background:#2563eb;color:#fff;border:0;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
button.rec{background:#16a34a} button.del{background:#475569;padding:3px 9px;font-size:11px;margin:0}
.kpi{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.box{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px 12px;flex:1;min-width:84px}
.box b{font-size:20px;display:block} .pos{color:#34d399} .neg{color:#f87171} .tag{font-size:11px;color:#94a3b8}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
th,td{padding:5px 5px;border-bottom:1px solid #1e293b;text-align:left} th{color:#94a3b8}
tr.hit{background:#14321f} .saved{color:#34d399;font-size:12px;margin-left:8px}
</style></head><body>
<h1>✍️ 手動買い目 検証（頭2艇 × あなたの軸・消し）</h1>
<p class="nav">🔥 <a href="manshu_chokuzen.html">直前 万舟予報</a>　／　📊 <a href="manshu.html">朝ランキング</a>　／　📈 <a href="forward_track.html">前向き戦績</a></p>
<p class="m">①1着固定＝<b>頭2艇</b>（直前版が自動算出）／②軸2艇・③消し1艇＝<b>あなたが他サイト等を見て入力</b>／④残り5艇を2-3着で折返し（①-②-④ ∪ ①-④-②）。
本日の直前TOP5を土台に、軸・消しを入れ替えて<b>この方法の的中率・回収率を検証</b>します。記録はこの端末のブラウザに保存（結果は自動照合）。
※娯楽用・利益保証なし・生活費は賭けない。</p>
<div id="tally" class="kpi"></div>
<h2 id="rhd">本日の対象レース</h2>
<div id="races"><p class="m">読み込み中…</p></div>
<h2>記録履歴（全期間・この端末）</h2>
<div id="history"></div>
<p class="m" style="margin-top:10px"><button class="del" onclick="settleAll()">結果を再照合</button>
　<button class="del" onclick="if(confirm('全記録を消去しますか？'))clearAll()">記録を全消去</button></p>
<script>
const LS='manual_buy_records_v1';
const load=()=>{try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}}};
const save=r=>localStorage.setItem(LS,JSON.stringify(r));
const key=(d,v,r)=>d+'_'+v+'_'+r;
let PICKS={date:'',races:[]}, RACEMAP={};

function combosFrom(head,jiku2,worst){
  const wide5=[1,2,3,4,5,6].filter(b=>b!==worst); const s=new Set();
  for(const a of head){
    for(const b of jiku2)for(const c of wide5){if(new Set([a,b,c]).size===3)s.add(a+'-'+b+'-'+c);}
    for(const b of wide5)for(const c of jiku2){if(new Set([a,b,c]).size===3)s.add(a+'-'+b+'-'+c);}
  }
  return [...s];
}
function selOpts(val){let o='';for(let b=1;b<=6;b++)o+='<option value="'+b+'"'+(b==val?' selected':'')+'>'+b+'</option>';return o;}
function getInputs(k){return {jiku2:[+document.getElementById('j0_'+k).value,+document.getElementById('j1_'+k).value],worst:+document.getElementById('w_'+k).value};}
function preview(k){
  const r=RACEMAP[k]; const {jiku2,worst}=getInputs(k);
  const combos=combosFrom(r.head2,jiku2,worst);
  const wide5=[1,2,3,4,5,6].filter(b=>b!==worst);
  const h=r.head2.join(''),j=jiku2.join(''),wd=wide5.join('');
  const warn=(jiku2[0]===jiku2[1])?' <span class="neg">※軸が同じ艇</span>':'';
  document.getElementById('buy_'+k).innerHTML='買い目: <b>'+h+'-'+j+'-'+wd+'</b> ／ <b>'+h+'-'+wd+'-'+j+'</b> ('+combos.length+'点)'+warn;
  return combos;
}
function record(k){
  const r=RACEMAP[k]; const {jiku2,worst}=getInputs(k);
  if(jiku2[0]===jiku2[1]){alert('軸2艇が同じです。別の2艇を選んでください。');return;}
  const combos=combosFrom(r.head2,jiku2,worst); const recs=load();
  recs[k]={date:PICKS.date,venue:r.venue,vn:r.vn,race_no:r.race_no,head2:r.head2,jiku2:jiku2,worst:worst,
    combos:combos,npts:combos.length,ts:new Date().toISOString().slice(0,16),
    settled:0,win_combo:null,payout:null,hit:null};
  save(recs); document.getElementById('sv_'+k).textContent='✓記録しました';
  renderTally(); renderHistory(); settleAll();
}
async function settleAll(){
  const recs=load();
  const dates=[...new Set(Object.values(recs).filter(r=>!r.settled).map(r=>r.date))];
  for(const d of dates){
    let data; try{data=await (await fetch('https://boatraceopenapi.github.io/results/v2/'+d.slice(0,4)+'/'+d.replace(/-/g,'')+'.json')).json();}catch(e){continue;}
    const m={};
    for(const res of (data.results||[])){const t=res.payouts&&res.payouts.trifecta&&res.payouts.trifecta[0];if(t)m[res.race_stadium_number+'_'+res.race_number]=t;}
    for(const k in recs){const r=recs[k];if(r.settled||r.date!==d)continue;const t=m[parseInt(r.venue)+'_'+r.race_no];if(!t)continue;
      r.settled=1;r.win_combo=t.combination;r.payout=t.payout;r.hit=r.combos.includes(t.combination)?1:0;}
  }
  save(recs); renderTally(); renderHistory();
}
function box(tag,val,sub,cls){return '<div class="box"><span class="tag">'+tag+'</span><b class="'+(cls||'')+'">'+val+'</b><span class="tag">'+(sub||'')+'</span></div>';}
function renderTally(){
  const recs=Object.values(load()); const st=recs.filter(r=>r.settled); const nst=st.length;
  const hit=st.filter(r=>r.hit).length;
  const ret=st.filter(r=>r.hit).reduce((a,r)=>a+(r.payout||0),0);
  const cost=st.reduce((a,r)=>a+r.npts*100,0);
  const roi=cost?ret/cost*100:0;
  const man=st.filter(r=>r.payout>=10000).length;
  document.getElementById('tally').innerHTML=
    box('記録/確定',recs.length+'/'+nst,'レース','')+
    box('的中率',(nst?hit/nst*100:0).toFixed(0)+'%','実3連単が買い目に','')+
    box('回収率',(roi).toFixed(0)+'%','配当'+ret.toLocaleString()+'円',roi>=100?'pos':'neg')+
    box('万舟率',(nst?man/nst*100:0).toFixed(0)+'%','確定が万舟','');
}
function renderHistory(){
  const recs=Object.values(load()).sort((a,b)=>(b.date+b.venue+('0'+b.race_no).slice(-2)).localeCompare(a.date+a.venue+('0'+a.race_no).slice(-2)));
  if(!recs.length){document.getElementById('history').innerHTML='<p class="m">まだ記録がありません。上のレースで軸・消しを入れて「この買い目を記録」を押してください。</p>';return;}
  let h='<table><thead><tr><th>日</th><th>場R</th><th>頭</th><th>軸/消</th><th>点</th><th>的中</th><th>結果(配当)</th><th></th></tr></thead><tbody>';
  for(const r of recs){
    const res=r.settled?(r.win_combo+' '+(r.payout||0).toLocaleString()+'円'):'結果待ち';
    const hh=r.settled?(r.hit?'✅':'✗'):'—';
    h+='<tr class="'+(r.hit?'hit':'')+'"><td>'+r.date.slice(5)+'</td><td>'+r.vn+r.race_no+'R</td><td>'+r.head2.join('')+'</td><td>'+r.jiku2.join('')+'/消'+r.worst+'</td><td>'+r.npts+'</td><td>'+hh+'</td><td>'+res+'</td><td><button class="del" onclick="delRec(\''+key(r.date,r.venue,r.race_no)+'\')">削除</button></td></tr>';
  }
  document.getElementById('history').innerHTML=h+'</tbody></table>';
}
function delRec(k){const r=load();delete r[k];save(r);renderTally();renderHistory();}
function clearAll(){localStorage.removeItem(LS);renderTally();renderHistory();}
async function init(){
  try{PICKS=await (await fetch('manual_picks.json?t='+Date.now())).json();}
  catch(e){document.getElementById('races').innerHTML='<p class="m">本日の直前TOP5データを読めません（直前版がまだ実行されていない可能性）。履歴の照合は動きます。</p>';renderTally();renderHistory();await settleAll();return;}
  const recs=load();
  document.getElementById('rhd').textContent='本日（'+PICKS.date+'）の対象レース — 直前TOP5';
  let html=''; RACEMAP={};
  if(!PICKS.races.length)html='<p class="m">本日のTOP5はまだありません（展示が出ると増えます）。</p>';
  for(const r of PICKS.races){
    const k=key(PICKS.date,r.venue,r.race_no); RACEMAP[k]=r;
    const sv=recs[k]; const j=(sv&&sv.jiku2)||r.jiku2_def, w=(sv&&sv.worst)||r.worst_def;
    const loc=Object.entries(r.loc_t3).map(([b,v])=>b+'号'+Math.round(v*100)+'%').join(' ');
    const oc='onchange="preview(\''+k+'\')"';
    html+='<div class="c"><div class="hd">'+r.vn+r.race_no+'R <span class="m">締切'+(r.deadline||'--:--')+' ／ 万舟率'+Math.round(r.manshu*100)+'% ／ 1号艇展示'+r.b1exrank+'位'+(r.b1exrank>=4?'🔥':'')+'</span></div>'
      +'<div class="row"><span class="lbl">①1着固定</span><b>頭2艇 '+r.head2.join('・')+'号艇</b> <span class="m">(自動)</span></div>'
      +'<div class="row"><span class="lbl">②軸2艇</span><select id="j0_'+k+'" '+oc+'>'+selOpts(j[0])+'</select><select id="j1_'+k+'" '+oc+'>'+selOpts(j[1])+'</select> <span class="m">←他サイトの軸を入力</span></div>'
      +'<div class="row"><span class="lbl">③消し</span><select id="w_'+k+'" '+oc+'>'+selOpts(w)+'</select>号艇を消す <span class="m">←入力</span></div>'
      +'<div class="row m">当地3着内率(参考): '+loc+'</div>'
      +'<div class="buy" id="buy_'+k+'"></div>'
      +'<button class="rec" onclick="record(\''+k+'\')">この買い目を記録</button><span class="saved" id="sv_'+k+'">'+(sv?'✓記録済':'')+'</span>'
      +'</div>';
  }
  document.getElementById('races').innerHTML=html;
  for(const r of PICKS.races)preview(key(PICKS.date,r.venue,r.race_no));
  renderTally(); renderHistory(); await settleAll();
}
init();
</script>
</body></html>
