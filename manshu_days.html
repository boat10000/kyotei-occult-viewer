<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Codex BOATERS 万舟率ランキング 日別結果</title>
  <style>
    body{
      font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      background:#f4f6fb;
      color:#1c2230;
      max-width:980px;
      margin:0 auto;
      padding:16px;
      line-height:1.6;
    }
    h1{font-size:22px;margin:0 0 6px}
    .muted{color:#64748b;font-size:12px}
    .lead{font-size:13px;color:#475569;margin:4px 0 14px}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 16px}
    .nav a{
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 12px;
      border-radius:8px;
      background:#fff;
      border:1px solid #dbe3ef;
      color:#1d4ed8;
      font-weight:800;
      text-decoration:none;
      font-size:13px;
    }
    .bar{
      background:#fff;
      border:1px solid #e3e8f0;
      border-radius:10px;
      padding:12px 14px;
      margin:10px 0 14px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    select{font:inherit;padding:7px 10px;border:1px solid #c7dafc;border-radius:8px;background:#fff}
    .sum{font-size:13px;color:#334155;font-weight:700}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 0}
    .chip{background:#fff7ed;border:1px solid #fed7aa;border-radius:999px;color:#9a3412;font-size:12px;font-weight:800;padding:5px 9px}
    .chip.hot{background:#fee2e2;border-color:#fecaca;color:#991b1b}
    table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid #e3e8f0;border-radius:8px;overflow:hidden}
    th,td{padding:8px 9px;border-bottom:1px solid #eef1f5;text-align:left;vertical-align:top}
    th{background:#f8fafc;color:#475569;font-size:12px}
    td.p{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
    .race{font-weight:900;white-space:nowrap}
    .rate{font-size:18px;font-weight:900;color:#dc2626;white-space:nowrap}
    .cond{font-size:12px;color:#475569;line-height:1.45}
    .mini{font-size:11.5px;color:#64748b}
    .hit{background:#fff7ed}
    .man{color:#dc2626;font-weight:900}
    .miss{color:#64748b;font-weight:800}
    @media(max-width:760px){
      table,thead,tbody,tr,th,td{display:block}
      thead{display:none}
      tr{border-bottom:1px solid #e5e7eb;padding:9px}
      td{border:0;padding:3px 0}
      td.p{text-align:left}
    }
  </style>
</head>
<body>
  <h1>Codex BOATERS 万舟率ランキング 日別結果</h1>
  <p class="lead">保存済みのCodexランキングJSONから、過去日の予想と結果を表示します。</p>
  <div class="nav">
    <a href="manshu.html">本日のランキング</a>
    <a href="manshu_posts.html">投稿センター</a>
    <a href="manshu_chokuzen.html">直前 万舟予報</a>
  </div>
  <div class="bar">
    <label>日付：<select id="date-select"></select></label>
    <a id="open-day" href="manshu.html">選択日のランキングを開く</a>
    <span class="sum" id="summary">読み込み中…</span>
    <div class="chips" id="chips"></div>
  </div>
  <table>
    <thead>
      <tr><th>順位・レース</th><th>万舟率</th><th>該当ロジック</th><th>結果</th><th>BOATERS指標</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <script>
    "use strict";
    var INDEX_URL = "data/output/boaters_manshu_history_index.json";
    var STATE = { dates: [], current: null };

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function fmtPct(v) {
      return v == null ? "--" : Number(v).toFixed(2).replace(/\.00$/, "") + "%";
    }
    function fmtYen(v) {
      return v == null ? "結果待ち" : Number(v).toLocaleString("ja-JP") + "円";
    }
    function compactDate(d) {
      return String(d || "").replace(/-/g, "");
    }
    function dataPath(date) {
      var hit = STATE.dates.find(function (d) { return d.date === date; });
      return hit && hit.path ? hit.path : "data/output/boaters_manshu_ranking_" + compactDate(date) + ".json";
    }
    function render(data) {
      STATE.current = data;
      var summary = data.summary || {};
      document.getElementById("summary").textContent =
        "TOP" + (summary.displayed_top_n || (data.races || []).length) +
        " / 確定 " + (summary.settled_top_n || 0) +
        " / 万舟 " + (summary.manshu_hits_top_n || 0) +
        " / 実測 " + fmtPct(summary.actual_manshu_rate_top_n_pct);
      document.getElementById("chips").innerHTML = [
        '<span class="chip hot">' + esc(data.logic_label || "Codex BOATERSロジック") + '</span>',
        '<span class="chip">閾値 ' + esc(fmtPct(data.threshold_pct)) + '</span>',
        '<span class="chip">展示6艇 ' + esc(summary.races_with_full_tenji || 0) + 'R</span>',
        '<span class="chip">1周6艇 ' + esc(summary.races_with_full_isshu || 0) + 'R</span>'
      ].join("");
      document.getElementById("rows").innerHTML = (data.races || []).map(function (race) {
        var result = race.result || {};
        var metrics = race.metrics || {};
        var manshu = !!result.manshu;
        var deadline = race.deadline_time ? String(race.deadline_time).slice(11, 16) : "--:--";
        return [
          '<tr class="' + (manshu ? "hit" : "") + '">',
          '<td><span class="race">' + esc(race.rank) + ". " + esc(race.place_name) + esc(race.round) + 'R</span><br><span class="mini">' + esc(deadline) + '締切 / ' + esc(race.status || "") + '</span></td>',
          '<td><span class="rate">' + esc(fmtPct(race.manshu_rate_pct)) + '</span><br><span class="mini">直近 ' + esc(fmtPct(race.recent_rate_pct)) + '</span></td>',
          '<td class="cond">' + esc(race.condition || "") + '<br><span class="mini">ロジック ' + esc(race.matched_logic_count || 0) + '件</span></td>',
          '<td class="p"><b>' + esc(result.trifecta || "--") + '</b><br><span class="' + (manshu ? "man" : "miss") + '">' + esc(fmtYen(result.payout_yen)) + (manshu ? " 万舟" : "") + '</span></td>',
          '<td class="cond">1号艇 AI予測 ' + esc(fmtPct(metrics.boat1_ai_prediction_pct)) + '<br>AI+一般3連対 ' + esc(fmtPct(metrics.boat1_ai_plus)) + '<br>1号艇逃げ失敗 ' + esc(fmtPct(metrics.boat1_loss_pct)) + '</td>',
          '</tr>'
        ].join("");
      }).join("");
    }
    async function loadDay(date) {
      document.getElementById("open-day").href = "manshu.html?date=" + encodeURIComponent(date);
      document.getElementById("summary").textContent = date + " を読み込み中…";
      var res = await fetch(dataPath(date), { cache: "no-store" });
      if (!res.ok) throw new Error("ranking json not found");
      render(await res.json());
    }
    async function init() {
      var res = await fetch(INDEX_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("history index not found");
      var index = await res.json();
      STATE.dates = (index.dates || []).slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
      var sel = document.getElementById("date-select");
      sel.innerHTML = STATE.dates.map(function (d) {
        return '<option value="' + esc(d.date) + '">' + esc(d.date) + ' / 万舟 ' + esc(d.manshu_hits_top_n) + '/' + esc(d.settled_top_n) + '</option>';
      }).join("");
      sel.addEventListener("change", function () { loadDay(sel.value); });
      if (STATE.dates[0]) loadDay(STATE.dates[0].date);
    }
    init().catch(function (err) {
      document.getElementById("summary").textContent = "Codex履歴JSONを読み込めませんでした: " + err.message;
    });
  </script>
</body>
</html>
